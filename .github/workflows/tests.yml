name: Tests

on:
  pull_request:
    paths:
      - open_normative/**
      - scripts/**
      - tests/**
      - pyproject.toml
      - .github/workflows/tests.yml
  push:
    branches: [main]
    paths:
      - open_normative/**
      - scripts/**
      - tests/**
      - pyproject.toml
      - .github/workflows/tests.yml
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[aws,datasets,dev]'

      - name: Run tests
        # Matches the canonical command in CLAUDE.md: asrpy-dependent tests
        # are skipped because upstream has a numpy 2.x compatibility bug.
        run: >-
          python -m pytest tests/
          --ignore=tests/test_pipeline.py
          --ignore=tests/test_preprocessing.py
          -v
